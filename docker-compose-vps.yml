services:
  app:
    image: ghcr.io/maximosro/portfolio-tracker:latest
    restart: always
    network_mode: host
    environment:
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SPRING_DEVTOOLS_RESTART_ENABLED=false
      - TZ=Europe/Madrid
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`portfolio.srv1158554.hstgr.cloud`)
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app.entrypoints=web,websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.middlewares.app-redirect.redirectregex.regex=^https?://portfolio\.srv1158554\.hstgr\.cloud/?$$
      - traefik.http.middlewares.app-redirect.redirectregex.replacement=https://portfolio.srv1158554.hstgr.cloud/portfoliotracker/
      - traefik.http.middlewares.app-redirect.redirectregex.permanent=true
      - traefik.http.routers.app.middlewares=app-redirect@docker
      - traefik.http.services.app.loadbalancer.server.url=http://127.0.0.1:19480
