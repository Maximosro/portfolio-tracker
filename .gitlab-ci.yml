# GitLab Pages deployment
# Sirve los archivos estáticos de docs/public/ como GitLab Pages
image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r docs/public/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"


